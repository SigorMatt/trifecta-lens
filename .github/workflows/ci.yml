name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        # @v8 / @v8.0 moving tags no longer resolve; pin a full version tag.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.25"
      - name: uv available
        run: uv --version

