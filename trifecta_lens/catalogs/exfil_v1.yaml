# The default v1 role catalog — the labeling function, as data (SPEC.md §4).
#
# This file is the ONLY tunable layer of detection (DESIGN.md §4). The automaton
# is fixed and closed; coverage is extended by adding an entry here, or by
# shipping your own overlay with `--catalog my.yaml`. If you find yourself
# wanting to change the engine to cover a tool, the answer is an entry.
#
# `match.tool` is a REGEX, fully anchored (re.fullmatch), matched against the
# event's tool name. Under MCP that name is server-qualified — `<server>__<tool>`
# (SPEC.md §2) — so entries below come in two shapes: bare names (the Phase 1
# demo harness and any host that does not qualify) and qualified names (a real
# MCP stack). Both are legitimate; the trace decides which one is seen.
#
# THE SERVER-NAME REPETITION TRAP — read this before writing a pattern.
#
# Many of the most-deployed servers repeat their own name inside the tool name:
# Slack exposes `slack_post_message`, Brave exposes `brave_web_search`, Puppeteer
# exposes `puppeteer_navigate`. Qualified, those arrive as:
#
#     slack__slack_post_message      brave__brave_web_search
#
# The obvious pattern `(.*__)?post_message` DOES NOT MATCH THAT. `.*__` eats
# `slack__`, leaving `slack_post_message`, which is not `post_message`. For most of
# this project's life that is exactly what happened: the single commonest exfil sink
# in production MCP — a Slack message post — was invisible to this catalog, and so
# were web search and browser navigation, the two commonest untrusted sources.
# Nothing lied; the coverage report dutifully listed them as unmatched. It just
# never had an opinion about anyone's real stack.
#
# So the prefix idiom is `(.*__)?([a-z0-9]+_)?` — optional server qualification,
# then the optional server-name repetition. It is applied DELIBERATELY, only to
# entries where a real server is known to need it, and never as a blanket loosening
# of every pattern in the file: `([a-z0-9]+_)?` widens what a rule accepts, and a
# rule that accepts too much manufactures confident findings, which is the one
# failure this catalog exists to avoid.
#
# A tool that matches several entries takes the UNION of their roles. The note
# cited for a role is the first matching entry's, in file order.
#
# Labeling is heuristic and WILL be imperfect. That is expected and is the
# contributor flywheel: every finding cites the ENTRY ID below that assigned each
# role, so a user can see the call we made, and knows exactly what to edit — or to
# override in their own `--catalog` overlay. See CONTRIBUTING.md.
#
# COVERAGE IS DELIBERATELY CONSERVATIVE. A wrong label is worse than a missing one:
# a missing label loses a finding, but a wrong label manufactures a confident
# finding about a role nobody assigned — and the whole product is the claim that we
# only say what we can support. So entries name tools whose SEMANTICS are clear from
# the name, and stop. Where a family is real but the naming is ambiguous, it is
# noted as absent rather than guessed at (see the RAG note below).

version: 1

entries:
  # --- untrusted_source: content the agent did not get from its principal ----
  #
  # NOT here: RAG / retrieved-document reads (SPEC.md §4 lists them). Real tools
  # spell that `search`, `query`, `retrieve` — names that also belong to a dozen
  # harmless things, including `filesystem__search_files`, which returns NAMES and
  # is not a source at all. No captured trace yet carries a RAG read, and inventing
  # a pattern for one would be guessing. It lands when a real trace does.

  - id: fetch.url
    match: {tool: "fetch"}
    role: untrusted_source
    note: "returns content fetched from a URL"

  - id: mcp.fetch.fetch
    match: {tool: "fetch__fetch"}
    role: untrusted_source
    note: "fetches a URL and returns its content to the model (MCP fetch server)"

  # Issue / PR / comment text: written by third parties, read by the agent. This is
  # the single most-documented real-world injection vector.
  - id: issue.text
    match: {tool: "(.*__)?(read|get|list)_(issue|issues|pull_request|pull_requests|comment|comments)"}
    role: untrusted_source
    note: "returns issue/PR/comment text, which is written by third parties"

  # Inbound email: same argument, different channel.
  - id: email.inbound
    match: {tool: "(.*__)?(read|get|list|search)_(email|emails|message|messages|thread|threads)"}
    role: untrusted_source
    note: "returns inbound message content, which is written by third parties"

  # Web search results. Third-party content by definition, and rankable/seedable by
  # whoever wants the agent to read something — the same argument as issue text, on a
  # bigger surface. `brave_web_search` needs the repetition idiom (see the trap above).
  - id: web.search
    match: {tool: "(.*__)?([a-z0-9]+_)?(web_search|local_search|google_search|search_web)"}
    role: untrusted_source
    note: "returns web search results, which are third-party content"

  # A page the browser fetched. This is `fetch` with a rendering engine in front of it,
  # and it is how most agent frameworks read the web now.
  #
  # NOT here: `puppeteer_evaluate` / `browser_evaluate`, which execute script in the
  # page. That is an ACTION, not a read, and it belongs to sink:impact — but the
  # action-hijack family does not exist in v1, so labeling it would add a leg no family
  # accepts on while implying we reason about it. It waits for Phase 4.
  - id: browser.page
    match: {tool: "(.*__)?([a-z0-9]+_)?(navigate|browser_navigate|goto_page)"}
    role: untrusted_source
    note: "returns the content of a web page the browser was pointed at"

  # Chat history: other people's messages, read by the agent. Same vector as issue
  # text — a third party writes it, the agent ingests it — and Slack is where most
  # organisations actually keep it.
  - id: chat.history
    match: {tool: "(.*__)?([a-z0-9]+_)?(get_channel_history|get_thread_replies|conversations_history|conversations_replies)"}
    role: untrusted_source
    note: "returns other users' chat messages, which are written by third parties"

  # --- sensitive_data: data whose leaving the boundary is the harm ------------

  - id: vault.secret
    match: {tool: "vault"}
    role: sensitive_data
    note: "reads a credential from the secret store"

  - id: secret.read
    match: {tool: "(.*__)?(read|get)_(secret|secrets|credential|credentials|token|api_key)"}
    role: sensitive_data
    note: "reads a credential or secret"

  - id: memory.read
    match: {tool: "(.*__)?(read|get|recall)_(memory|memories)"}
    role: sensitive_data
    note: "reads the agent's own memory, which may hold anything it was told"

  # The MCP filesystem server's content reads. Note what is NOT here: the
  # directory-listing and metadata tools (list_directory, get_file_info,
  # search_files, directory_tree) return *names*, not file contents. Labeling
  # them sensitive_data would make every `ls` a leg of an exfil finding — noise,
  # not evidence.
  - id: mcp.filesystem.content_read
    match: {tool: "filesystem__read_(text_|media_|multiple_)?files?"}
    role: sensitive_data
    note: "reads file contents from the local filesystem (MCP filesystem server)"

  # The SAME leg, from any other server. The entry above is anchored to `filesystem__`,
  # so for most of this project's life a file read was only a leg if it came from the
  # reference filesystem server: `gdrive__read_file` — a document out of the company's
  # Drive — was silent. The generic pattern is what the leg actually means.
  #
  # Ordering matters: the filesystem entry sits ABOVE this one, so a filesystem read
  # still cites the more specific note. Roles union; the first match wins the citation.
  #
  # Still NOT here, and for the same reason as before: directory listings, metadata and
  # name searches (`list_directory`, `get_file_info`, `search_files`). They return
  # NAMES. Labeling them would make every `ls` a leg of an exfil finding.
  - id: file.read
    match: {tool: "(.*__)?read_(text_|media_|multiple_)?files?"}
    role: sensitive_data
    note: "reads file contents"

  # --- sink:exfil: data crosses the boundary outward -------------------------

  - id: webhook.post
    match: {tool: "webhook"}
    role: sink
    subtype: exfil
    note: "sends a payload to an outbound HTTP endpoint"

  - id: mcp.notify.send
    match: {tool: "notify__send"}
    role: sink
    subtype: exfil
    note: "sends a message body to an outbound notification endpoint"

  # An outbound HTTP request with a body the model composed.
  - id: http.outbound
    match: {tool: "(.*__)?(http_post|post_request|send_request|http_request)"}
    role: sink
    subtype: exfil
    note: "sends a request body to an outbound HTTP endpoint"

  # Email/chat send: the data leaves the boundary to a recipient the model chose.
  #
  # The `([a-z0-9]+_)?` is the repetition idiom, and it is doing real work here: Slack's
  # server exposes `slack_post_message`, so the qualified name is
  # `slack__slack_post_message` and the old pattern missed it. This is the commonest
  # outbound sink in production MCP, and it was the one this catalog could not see.
  - id: message.send
    match: {tool: "(.*__)?([a-z0-9]+_)?(send_email|send_message|post_message|send_notification|reply_to_thread)"}
    role: sink
    subtype: exfil
    note: "sends a message body to an external recipient"

  # A write to a SHARED or PUBLIC location — SPEC.md §4's fourth exfil sink, and the
  # one people forget. Posting a comment on a public issue puts the payload on the
  # internet just as surely as a POST does; it simply does not look like one.
  - id: public.write
    match: {tool: "(.*__)?(post_comment|create_comment|add_comment|create_issue|update_issue)"}
    role: sink
    subtype: exfil
    note: "writes text to a shared/public location (issue, PR, comment thread)"

  # The same sink, in a knowledge base. A Notion page or a wiki doc is a SHARED
  # location: whatever the model writes there is readable by everyone in the workspace,
  # and often by anyone with the link. It does not look like an outbound request, which
  # is precisely why it is worth labeling.
  - id: docs.write
    match: {tool: "(.*__)?(create_page|update_page|append_block_children|create_document|update_document)"}
    role: sink
    subtype: exfil
    note: "writes text to a shared workspace document (wiki/knowledge base page)"

  # --- sink:impact: a consequential ACTION, not a data leak -------------------
  #
  # These entries are live catalog data with NO family accepting on them in v1:
  # the action-hijack family is fast-follow (SPEC.md §3, ROADMAP Phase 4). They
  # are here because they are true, and because the fact that adding them changes
  # no v1 finding is the cleanest demonstration that coverage lives in the data
  # and acceptance lives in the (fixed) machine.
  - id: mcp.filesystem.mutate
    match: {tool: "filesystem__(write_file|edit_file|move_file|create_directory)"}
    role: sink
    subtype: impact
    note: "writes to or mutates the local filesystem (MCP filesystem server)"

  - id: shell.exec
    match: {tool: "(.*__)?(shell|bash|exec|execute|run_command|run_shell_command)"}
    role: sink
    subtype: impact
    note: "executes a shell command"

  - id: repo.merge
    match: {tool: "(.*__)?(merge_pull_request|merge_pr|merge_branch)"}
    role: sink
    subtype: impact
    note: "merges code into a branch"

  - id: repo.write
    match: {tool: "(.*__)?(create_or_update_file|push_files|delete_file|create_branch)"}
    role: sink
    subtype: impact
    note: "writes code or files into a repository"

  # --- DELIBERATELY ABSENT — database and search reads ------------------------
  #
  # Not an oversight. Postgres exposes `query` / `read_query`; Snowflake the same;
  # Notion and Drive spell their reads `search`. A stranger running any of them gets
  # SILENCE from this catalog, and the coverage report names every one of those tools
  # as unmatched (D13), so the silence is at least audible.
  #
  # The pattern would have to be `search|query|retrieve`, and that is the collision
  # CONTRIBUTING.md already refuses to guess at. A query may read a public price list
  # or the credentials table; the NAME does not say which, and this catalog's whole
  # discipline is that a wrong label is worse than a missing one. A blanket
  # `sensitive_data` on every `query` would put a confident leg under findings for
  # every agent that has ever read a database — noise wearing the costume of evidence.
  #
  # This is the case the `--catalog` overlay exists for. A user who KNOWS their
  # Postgres holds secrets says so in four lines, and the unmodified engine finds the
  # trifecta on their stack (USAGE.md has the worked example). That is the mechanism
  # working, not a gap in it. It lands here as a default only when a real trace shows
  # a naming convention that carries the semantics — D9's rule, and it still stands.
