# The default v1 role catalog — the labeling function, as data (SPEC.md §4).
#
# This file is the ONLY tunable layer of detection (DESIGN.md §4). The automaton
# is fixed and closed; coverage is extended by adding an entry here, or by
# shipping your own overlay with `--catalog my.yaml`. If you find yourself
# wanting to change the engine to cover a tool, the answer is an entry.
#
# `match.tool` is a REGEX, fully anchored (re.fullmatch), matched against the
# event's tool name. Under MCP that name is server-qualified — `<server>__<tool>`
# (SPEC.md §2) — so entries below come in two shapes: bare names (the Phase 1
# demo harness and any host that does not qualify) and qualified names (a real
# MCP stack). Both are legitimate; the trace decides which one is seen.
#
# A tool that matches several entries takes the UNION of their roles. The note
# cited for a role is the first matching entry's, in file order.
#
# Labeling is heuristic and WILL be imperfect. That is expected and is the
# contributor flywheel: every finding cites the note below that assigned each
# role, so a user can see the call we made and correct it.

version: 1

entries:
  # --- untrusted_source: content the agent did not get from its principal ----

  - id: fetch.url
    match: {tool: "fetch"}
    role: untrusted_source
    note: "returns content fetched from a URL"

  - id: mcp.fetch.fetch
    match: {tool: "fetch__fetch"}
    role: untrusted_source
    note: "fetches a URL and returns its content to the model (MCP fetch server)"

  # --- sensitive_data: data whose leaving the boundary is the harm ------------

  - id: vault.secret
    match: {tool: "vault"}
    role: sensitive_data
    note: "reads a credential from the secret store"

  # The MCP filesystem server's content reads. Note what is NOT here: the
  # directory-listing and metadata tools (list_directory, get_file_info,
  # search_files, directory_tree) return *names*, not file contents. Labeling
  # them sensitive_data would make every `ls` a leg of an exfil finding — noise,
  # not evidence.
  - id: mcp.filesystem.content_read
    match: {tool: "filesystem__read_(text_|media_|multiple_)?files?"}
    role: sensitive_data
    note: "reads file contents from the local filesystem (MCP filesystem server)"

  # --- sink:exfil: data crosses the boundary outward -------------------------

  - id: webhook.post
    match: {tool: "webhook"}
    role: sink
    subtype: exfil
    note: "sends a payload to an outbound HTTP endpoint"

  - id: mcp.notify.send
    match: {tool: "notify__send"}
    role: sink
    subtype: exfil
    note: "sends a message body to an outbound notification endpoint"

  # --- sink:impact: a consequential ACTION, not a data leak -------------------
  #
  # These entries are live catalog data with NO family accepting on them in v1:
  # the action-hijack family is fast-follow (SPEC.md §3, ROADMAP Phase 4). They
  # are here because they are true, and because the fact that adding them changes
  # no v1 finding is the cleanest demonstration that coverage lives in the data
  # and acceptance lives in the (fixed) machine.
  - id: mcp.filesystem.mutate
    match: {tool: "filesystem__(write_file|edit_file|move_file|create_directory)"}
    role: sink
    subtype: impact
    note: "writes to or mutates the local filesystem (MCP filesystem server)"
