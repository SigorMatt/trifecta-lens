[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trifecta-lens"
version = "0.1.0"
description = "Read-only analyzer that detects lethal-trifecta / data-exfil exposure in MCP-based agent systems from a captured trace and the MCP manifest."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
trifecta-lens = "trifecta_lens.cli:main"

[project.optional-dependencies]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
